          </server>
          <ldap-type>active-directory</ldap-type>
          <bind-dn>palo-svac@radicaldc.lab</bind-dn>
          <bind-password>REDACTED</bind-password>
          <ssl>no</ssl>
          <base>DC=radicaldc,DC=lab</base>
